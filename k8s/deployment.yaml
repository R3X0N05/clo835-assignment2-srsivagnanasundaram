apiVersion: apps/v1
kind: Deployment
metadata:
  name: clo835-assignment2-srsivagnanasundaram
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clo835-assignment2-srsivagnanasundaram
  template:
    metadata:
      labels:
        app: clo835-assignment2-srsivagnanasundaram
    spec:
      containers:
        - name: clo835-assignment2-srsivagnanasundaram-container
          image: r3x0n05/clo835-assignment2-srsivagnanasundaram:0.2
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
