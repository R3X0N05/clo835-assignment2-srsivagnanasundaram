name: Build and Push to Docker Hub
on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2-srsivagnanasundaram:0.2
              ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2-srsivagnanasundaram:${{ steps.vars.outputs.sha_short }}
